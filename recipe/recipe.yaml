schema_version: 1

context:
  name: de-hochwasserzentralen
  version: "0.1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/de-hochwasserzentralen-${{ version }}.tar.gz
  sha256: 452c7bde4417755478f61f46e627fe1b3f40420de9a48f8637d6b85614c58d4e

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - poetry
  run:
    - python >=${{ python_min }}
    - python-dateutil
    - urllib3 >=1.25.3

tests:
  - python:
      imports:
        - deutschland.hochwasserzentralen
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: hochwasserzentrale.de API
  license: Apache-2.0
  license_file:
    - LICENSE
  homepage: https://github.com/bundesAPI/hochwasserzentralen-api

extra:
  recipe-maintainers:
    - jan-janssen
